server:
  servlet:
    context-path: /api

spring:
  application:
    name: finance-data-processing-backend
  
  # Database Configuration - PostgreSQL
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/financedb}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: FinanceHikariPool
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  # JPA Configuration for PostgreSQL
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate  # Use Flyway for schema management
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        time_zone: UTC
  
  # SQL Initialization - Disabled for PostgreSQL (using Flyway)
  sql:
    init:
      mode: never
  
  # H2 Console (disabled for PostgreSQL)
  h2:
    console:
      enabled: false
  
  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: 2000ms
  
  # Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    clean-disabled: false
    validate-on-migrate: false
    locations: classpath:db/migration
  
  # Async Configuration
  task:
    execution:
      pool:
        core-size: 2
        max-size: 5
        queue-capacity: 100
      thread-name-prefix: async-audit-

# Application Configuration
app:
  # JWT Configuration
  jwt:
    secret: ${JWT_SECRET:your-512-bit-secret-key-change-this-in-production-environment-must-be-at-least-512-bits}
    expiration-ms: 900000  # 15 minutes in milliseconds
    algorithm: HS512
  
  # Security Configuration
  security:
    bcrypt-strength: 12
  
  # Cache Configuration
  cache:
    dashboard-ttl-seconds: 300  # 5 minutes
  
  # Rate Limiting Configuration
  rate-limit:
    max-attempts: 5
    window-minutes: 15

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    redis:
      enabled: true
    db:
      enabled: true

# Swagger/OpenAPI Configuration
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs
    enabled: true

# Logging Configuration
logging:
  level:
    root: INFO
    com.fintech: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.jdbc.datasource.init: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  file:
    name: logs/application.log
